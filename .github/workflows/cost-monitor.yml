name: cost-monitor
on:
  schedule:
    - cron: '0 23 * * *'   # 毎日 23:00 UTC = 08:00 JST
  workflow_dispatch: {}     # 手動発火(検証用)
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: cost report → discord
        run: node tools/cost-report.mjs
        env:
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          DISCORD_COST_WEBHOOK: ${{ secrets.DISCORD_COST_WEBHOOK }}
